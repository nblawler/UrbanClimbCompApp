<div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

<aside id="appSidebar" class="app-sidebar" aria-hidden="true">
	<div class="sidebar-header">
		<div class="sidebar-title">Comp Circuit</div>
		<button type="button" class="sidebar-close" onclick="closeSidebar()" aria-label="Close menu">×</button>
	</div>

	<nav class="sidebar-nav">
		<a href="/my-comps" class="sidebar-link">Upcoming Competitions</a>
		<a href="/admin/comps" class="sidebar-link">Gym Admin</a>

		{% if session.get("competitor_id") or session.get("account_id") %}
			<a href="/logout" class="sidebar-link">Log out</a>
		{% else %}
			<a href="/login" class="sidebar-link">Login</a>
			<a href="/signup" class="sidebar-link">Signup</a>
		{% endif %}
	</nav>
</aside>

<style>
	.sidebar-overlay {
		position: fixed;
		inset: 0;
		background: rgba(0, 0, 0, 0.45);
		opacity: 0;
		pointer-events: none;
		transition: opacity 0.2s ease;
		z-index: 999;
	}

	.sidebar-overlay.open {
		opacity: 1;
		pointer-events: auto;
	}

	.app-sidebar {
		position: fixed;
		top: 0;
		left: 0;
		width: 300px;
		max-width: 85vw;
		height: 100vh;
		background: #132238;
		color: #fff;
		transform: translateX(-100%);
		transition: transform 0.22s ease;
		z-index: 1000;
		box-shadow: 2px 0 20px rgba(0, 0, 0, 0.3);
		display: flex;
		flex-direction: column;
	}

	.app-sidebar.open {
		transform: translateX(0);
	}

	.sidebar-header {
		display: flex;
		align-items: center;
		justify-content: space-between;
		padding: 1rem;
		border-bottom: 1px solid rgba(255,255,255,0.12);
	}

	.sidebar-title {
		font-size: 1.1rem;
		font-weight: 700;
	}

	.sidebar-close {
		background: none;
		border: none;
		color: #fff;
		font-size: 1.8rem;
		cursor: pointer;
		line-height: 1;
	}

	.sidebar-nav {
		padding: 1rem;
		display: flex;
		flex-direction: column;
		gap: 0.65rem;
	}

	.sidebar-link {
		color: #fff;
		text-decoration: none;
		padding: 0.85rem 0.95rem;
		border-radius: 10px;
		background: rgba(255,255,255,0.05);
		transition: background 0.15s ease;
		font-weight: 500;
	}

	.sidebar-link:hover {
		background: rgba(255,255,255,0.12);
	}

	.menu-toggle {
		background: none;
		border: 1px solid rgba(255,255,255,0.18);
		color: #fff;
		padding: 0.55rem 0.9rem;
		border-radius: 10px;
		cursor: pointer;
		font: inherit;
	}

	.menu-toggle:hover {
		background: rgba(255,255,255,0.08);
	}
</style>

<script>
	function openSidebar() {
		const sidebar = document.getElementById("appSidebar");
		const overlay = document.getElementById("sidebarOverlay");
		if (sidebar) sidebar.classList.add("open");
		if (overlay) overlay.classList.add("open");
		document.body.style.overflow = "hidden";
	}

	function closeSidebar() {
		const sidebar = document.getElementById("appSidebar");
		const overlay = document.getElementById("sidebarOverlay");
		if (sidebar) sidebar.classList.remove("open");
		if (overlay) overlay.classList.remove("open");
		document.body.style.overflow = "";
	}

	document.addEventListener("keydown", function (e) {
		if (e.key === "Escape") {
			closeSidebar();
		}
	});
</script>
